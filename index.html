<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>10반 개과천선 프로젝트</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="hero">
      <p class="badge">🏫 10반 학급 포털</p>
      <h1>10반 개과천선 프로젝트</h1>
      <p class="subtitle">출석 · 준비물 · 과제 · 칭찬 포인트</p>
    </header>

    <section class="time-card">
      <p class="label">현재 시간</p>
      <div id="clock" class="clock">--:--:--</div>
      <p class="small">8시 48분 이후 출석은 지각으로 기록됩니다.</p>
    </section>

    <section class="card attendance-card">
      <h2>🌞 오늘 출석하기</h2>
      <select id="studentSelect">
        <option value="">이름을 선택하세요</option>
      </select>
      <button onclick="checkAttendance()">출석하기</button>
      <p id="attendanceResult" class="result"></p>
    </section>

    <section class="grid">
      <article class="card">
        <h2>📅 이번주 학사일정</h2>
        <ul id="scheduleList" class="list"></ul>
      </article>

      <article class="card">
        <h2>🎒 오늘 준비물</h2>
        <div id="supplyBox" class="info-box"></div>
      </article>

      <article class="card">
        <h2>📚 마감임박 과제</h2>
        <div id="assignmentBox" class="info-box"></div>
      </article>

      <article class="card">
        <h2>🏆 이 달의 칭찬왕</h2>
        <ol id="praiseRanking" class="ranking"></ol>
      </article>
    </section>

    <section class="card input-section">
      <h2>🎒 준비물 담당자 입력</h2>
      <input id="supplyWriter" type="text" placeholder="작성자 이름" />
      <input id="supplyInput" type="text" placeholder="예: 체육복, 독서기록장" />
      <div class="button-row">
        <button onclick="submitSupply()">준비물 등록</button>
        <button class="sub" onclick="submitNoSupply()">오늘 준비물 없음</button>
      </div>
      <p id="supplyResult" class="result"></p>
    </section>

    <section class="card input-section">
      <h2>📚 과제 담당자 입력</h2>
      <input id="assignmentWriter" type="text" placeholder="작성자 이름" />
      <input id="assignmentTitle" type="text" placeholder="과제명 예: 영어 단어 외우기" />
      <input id="assignmentDue" type="date" />
      <div class="button-row">
        <button onclick="submitAssignment()">과제 등록</button>
        <button class="sub" onclick="submitNoAssignment()">마감임박 과제 없음</button>
      </div>
      <p id="assignmentResult" class="result"></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
